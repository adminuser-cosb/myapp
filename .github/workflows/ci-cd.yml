name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Run tests inside a temporary container (optional)
      - name: Build test Docker image
        run: |
          docker build -t myapp-test:latest .
      
      - name: Run tests in Docker
        run: |
          docker run --rm myapp-test:latest pytest tests

      # 3. Deploy to remote server via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            # 停止・削除済みコンテナがあれば削除
            docker stop myapp_cicd || true
            docker rm myapp_cicd || true
            docker rmi myapp:latest || true

            # サーバ上で Docker イメージをビルド
            docker build -t myapp:latest .

            # コンテナを起動
            docker run -d --name myapp_cicd -p 5001:5000 myapp:latest
