name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Build Docker image locally
      - name: Build Docker image
        run: |
          docker build -t myapp:latest .

      # 3. Run tests inside Docker
      - name: Run tests
        run: |
          docker run --rm myapp:latest pytest tests

      # 4. Deploy to remote server
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: |
            ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            # 停止・削除済みコンテナを削除
            docker stop myapp_cicd || true
            docker rm myapp_cicd || true
            docker rmi myapp:latest || true

            # サーバ上でコンテナを起動
            docker run -d --name myapp_cicd -p 5001:5000 myapp:latest
            # サーバ上でコンテナを起動
            docker run -d --name myapp_cicd -p 5001:5000 myapp:latest
