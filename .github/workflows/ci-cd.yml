name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: [self-hosted, linux]

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Build, test, and deploy
      - name: Build, test, and deploy Docker container
        run: |
          # プロジェクトディレクトリに移動
          cd /home/adminuser/myapp || exit 1

          # Dockerイメージをビルド（不要なファイルは .dockerignore で除外）
          docker build -t myapp:latest .

          # 既存コンテナがあれば停止・削除
          docker stop myapp_cicd || true
          docker rm myapp_cicd || true
          docker rmi myapp:latest || true

          # 新しいコンテナを起動
          docker run -d --name myapp_cicd -p 5001:5000 myapp:latest

          # コンテナ内でテストを実行
          docker run --rm myapp:latest pytest tests
