- name: Build, test, and deploy
  uses: appleboy/ssh-action@v0.1.8
  with:
    host: 192.168.121.50
    username: adminuser
    key: ${{ secrets.DEPLOY_KEY }}
    port: 22
    script: |
      cd /home/adminuser/myapp || exit 1

      # Docker イメージのビルド
      docker build -t myapp:latest .

      # 古いコンテナを停止・削除
      docker stop myapp_cicd || true
      docker rm myapp_cicd || true

      # 新しいコンテナを起動
      docker run -d --name myapp_cicd -p 5001:5000 myapp:latest

      # コンテナ内でテストを実行
      docker exec myapp_cicd pytest tests
